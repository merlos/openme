project:
  type: website
  output-dir: _site

website:
  title: "openme"
  description: "Single Packet Authentication — open your firewall with one encrypted packet"
  favicon: img/favicon.ico
  repo-url: https://github.com/merlos/openme
  repo-actions: [edit, issue]

  navbar:
    logo: img/logo.svg
    logo-alt: "openme"
    left:
      - text: "Documentation"
        href: index.qmd
      - text: "Getting Started"
        href: getting-started/index.qmd
      - text: "For Developers"
        href: developer/index.qmd
      - text: "Protocol"
        href: protocol/index.qmd
    right:
      - icon: github
        href: https://github.com/merlos/openme
      - text: "Website"
        href: https://openme.merlos.org

  sidebar:
    style: docked
    contents:
      - section: "Getting Started"
        contents:
          - getting-started/index.qmd
          - getting-started/server-setup.qmd
          - getting-started/client-setup.qmd
          - getting-started/adding-clients.qmd
          - getting-started/cross-compilation.qmd
      - section: "Configuration"
        contents:
          - configuration/index.qmd
          - configuration/server.qmd
          - configuration/client.qmd
          - configuration/firewall.qmd
      - section: "Security Model"
        contents:
          - security/index.qmd
          - security/key-management.qmd
      - section: "Protocol"
        contents:
          - protocol/index.qmd
      - section: "For Developers"
        contents:
          - developer/index.qmd
          - developer/go-api.qmd
          - developer/swift-openmekit.qmd
          - developer/android.qmd
          - developer/csharp-openmekit.qmd
          - developer/c-library.qmd
          - text: "Android KDoc Reference"
            href: android-sdk/index.qmd
      - section: "FAQ"
        contents:
          - faq/index.qmd

  page-footer:
    left: "© 2026 merlos.org — MIT License"
    right:
      - icon: github
        href: https://github.com/merlos/openme

format:
  html:
    theme:
      light: [flatly, custom.scss]
      dark: [darkly, custom.scss]
    highlight-style: github
    code-copy: true
    code-overflow: wrap
    toc: true
    toc-depth: 3
