project:
  type: website
  output-dir: _site

vars: _variables.yml

website:
  title: "OpenMe"
  description: "Single Packet Authentication — open your firewall with one encrypted packet"
  favicon: img/favicon.ico
  repo-url: https://github.com/merlos/openme
  repo-actions: [edit, issue]

  navbar:
    logo: img/logo.svg
    logo-alt: "openme"
    left:
      - text: "Download"
        href: download/index.qmd
      - text: "Documentation"
        href: index.qmd
      - text: "Getting Started"
        href: getting-started/index.qmd
      - text: "For Developers"
        href: developer/index.qmd
      - text: "Protocol"
        href: protocol/index.qmd
    right:
      - icon: github
        href: https://github.com/merlos/openme
      - text: "Website"
        href: https://openme.merlos.org

  sidebar:
    style: docked
    contents:
      - section: "Getting Started"
        contents:
          - getting-started/index.qmd
          - getting-started/server-setup.qmd
          - getting-started/adding-clients.qmd
          - getting-started/client-setup.qmd
      - section: "Server"
        contents:
          - server/index.qmd
          - server/configuration.qmd
          - server/firewall.qmd
          - server/service.qmd
      - section: "Clients"
        contents:
          - clients/index.qmd
          - clients/cli.qmd
          - clients/macos.qmd
          - clients/ios.qmd
          - clients/android.qmd
          - clients/windows.qmd
          - clients/watchos.qmd
      - section: "Configuration Reference"
        contents:
          - configuration/index.qmd
          - configuration/server.qmd
          - configuration/client.qmd
      - section: "Security Model"
        contents:
          - security/index.qmd
          - security/key-management.qmd
      - section: "Protocol"
        contents:
          - protocol/index.qmd
      - section: "For Developers"
        contents:
          - developer/index.qmd
          - developer/go-api.qmd
          - developer/swift-openmekit.qmd
          - developer/android.qmd
          - developer/csharp-openmekit.qmd
          - developer/c-library.qmd
          - section: "Generated API References"
            contents:
              - api/index.qmd
              - text: "Android KDoc Reference"
                href: android-sdk/index.qmd
              - text: "Go (pkg.go.dev) ↗"
                href: https://pkg.go.dev/github.com/merlos/openme
              - text: "Swift DocC Reference"
                href: api/swift/documentation/openmekit/
              - text: "C# DocFX Reference"
                href: api/csharp/index.html
              - text: "C Doxygen Reference"
                href: api/c/index.html
      - section: "FAQ"
        contents:
          - faq/index.qmd
          - section: "Comparisons"
            contents:
              - faq/vs-fwknop.qmd
              - faq/vs-wireguard.qmd
              - faq/vs-tailscale.qmd
              - faq/vs-vpn.qmd
          - privacy-policy.qmd

  page-footer:
    left: "© 2026 merlos.org — MIT License"
    right:
      - icon: github
        href: https://github.com/merlos/openme

format:
  html:
    theme:
      light: [flatly, custom.scss]
      dark: [darkly, custom.scss]
    highlight-style: github
    code-copy: true
    code-overflow: wrap
    toc: true
    toc-depth: 3
    title-prefix: "openme SPA"
