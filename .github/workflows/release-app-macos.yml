name: Release — macOS App

on:
  push:
    tags: ['app-macos-v*']

permissions:
  contents: write

jobs:
  test:
    name: Test macOS app
    runs-on: macos-26
    defaults:
      run:
        working-directory: apple
    steps:
      - uses: actions/checkout@v6
      - name: Resolve packages
        run: xcodebuild -workspace openme.xcworkspace -scheme openme-macos -resolvePackageDependencies
      - name: Run tests
        run: |
          xcodebuild test \
            -workspace openme.xcworkspace \
            -scheme openme-macos \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

  build:
    name: Build, sign & notarize DMG
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#app-macos-v}" >> "$GITHUB_OUTPUT"

      # ── Import Developer ID certificate into a short-lived keychain ──────────
      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          rm "$RUNNER_TEMP/certificate.p12"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # ── Build & sign (hardened runtime required for notarization) ────────────
      - name: Resolve packages
        working-directory: apple
        run: xcodebuild -workspace openme.xcworkspace -scheme openme-macos -resolvePackageDependencies

      - name: Build & sign
        working-directory: apple
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild build \
            -workspace openme.xcworkspace \
            -scheme openme-macos \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime"

      - name: Locate .app
        id: app
        run: |
          APP=$(find "$RUNNER_TEMP/DerivedData" -name "openme-macos.app" -type d | head -1)
          echo "APP_PATH=$APP" >> "$GITHUB_OUTPUT"

      # ── Create DMG and sign it ───────────────────────────────────────────────
      - name: Create & sign DMG
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          DMG_PATH="$RUNNER_TEMP/openme-macos-${VERSION}.dmg"

          mkdir -p "$RUNNER_TEMP/dmg_staging"
          cp -R "${{ steps.app.outputs.APP_PATH }}" "$RUNNER_TEMP/dmg_staging/"
          hdiutil create \
            -volname "openme ${VERSION}" \
            -srcfolder "$RUNNER_TEMP/dmg_staging" \
            -ov -format UDZO \
            "$DMG_PATH"

          codesign --sign "Developer ID Application" \
            --timestamp --options runtime \
            "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      # ── Notarize via App Store Connect API key ───────────────────────────────
      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          echo "API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

          xcrun notarytool submit "$DMG_PATH" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_KEY_ISSUER_ID" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple "$DMG_PATH"

      # ── Cleanup & upload ─────────────────────────────────────────────────────
      - name: Clean up secrets
        if: always()
        run: |
          rm -f "$API_KEY_PATH"
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: ${{ env.DMG_PATH }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: macos-dmg
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "macOS App ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*
