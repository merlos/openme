name: Release — macOS App

on:
  push:
    tags: ['app/macos/v*']

permissions:
  contents: write

jobs:
  test:
    name: Test macOS app
    runs-on: macos-15
    defaults:
      run:
        working-directory: apple
    steps:
      - uses: actions/checkout@v6
      - name: Resolve packages
        run: xcodebuild -workspace openme.xcworkspace -scheme openme-macos -resolvePackageDependencies
      - name: Run tests
        run: |
          xcodebuild test \
            -workspace openme.xcworkspace \
            -scheme openme-macos \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

  build:
    name: Build & package DMG
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_OUTPUT"
      - name: Resolve packages
        working-directory: apple
        run: xcodebuild -workspace openme.xcworkspace -scheme openme-macos -resolvePackageDependencies
      - name: Build
        working-directory: apple
        run: |
          xcodebuild build \
            -workspace openme.xcworkspace \
            -scheme openme-macos \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Locate .app
        id: app
        run: |
          APP=$(find "$RUNNER_TEMP/DerivedData" -name "openme-macos.app" -type d | head -1)
          echo "APP_PATH=$APP" >> "$GITHUB_OUTPUT"
      - name: Create DMG
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          DMG_NAME="openme-macos-${VERSION}.dmg"
          mkdir -p "$RUNNER_TEMP/dmg_staging"
          cp -R "${{ steps.app.outputs.APP_PATH }}" "$RUNNER_TEMP/dmg_staging/"
          hdiutil create \
            -volname "openme ${VERSION}" \
            -srcfolder "$RUNNER_TEMP/dmg_staging" \
            -ov -format UDZO \
            "$RUNNER_TEMP/$DMG_NAME"
          echo "DMG=$RUNNER_TEMP/$DMG_NAME" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: ${{ env.DMG }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: macos-dmg
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "macOS App ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*
