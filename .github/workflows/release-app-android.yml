# =============================================================================
# release-app-android.yml
#
# Builds, optionally signs, and publishes the openme Android app.
#
# TRIGGER
#   Push a tag matching  app-android-v*  (e.g. app-android-v0.1.0).
#   The version number is derived by stripping the "app-android-v" prefix.
#
# JOBS
#   test    → Runs openmekit JVM unit tests with Gradle on ubuntu-latest.
#
#   build   → Always produces a debug APK (openme-<version>-debug.apk).
#             If ANDROID_KEYSTORE_BASE64 is set, also produces a signed
#             release APK (openme-<version>.apk) using the keystore from
#             secrets. Both are uploaded as separate artifacts.
#
#   release → Downloads all APK artifacts and creates a GitHub Release named
#             "OpenMe Android App v<VERSION>" with auto-generated release notes.
#
# REQUIRED SECRETS (only needed for signed release APK)
#   ANDROID_KEYSTORE_BASE64
#     Your Android signing keystore (.jks or .keystore) base64-encoded:
#       base64 -i release.keystore | pbcopy   # macOS
#       base64 release.keystore               # Linux
#     If this secret is absent the workflow still runs but only produces
#     a debug APK.
#
#   ANDROID_KEYSTORE_PASSWORD
#     The password for the keystore file.
#
#   ANDROID_KEY_ALIAS
#     The alias of the signing key inside the keystore.
#
#   ANDROID_KEY_PASSWORD
#     The password for the key identified by ANDROID_KEY_ALIAS
#     (may be the same as ANDROID_KEYSTORE_PASSWORD).
#
# CREATING A KEYSTORE (first time)
#   keytool -genkeypair -v \
#     -keystore release.keystore \
#     -alias openme \
#     -keyalg RSA -keysize 4096 \
#     -validity 10000
#   # Then base64-encode and save as ANDROID_KEYSTORE_BASE64.
# =============================================================================
name: Release — Android App

on:
  push:
    tags: ['app-android-v*']

permissions:
  contents: write

jobs:
  test:
    name: openmekit JVM unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '17', distribution: temurin }
      - uses: gradle/actions/setup-gradle@v5
        with: { gradle-version: '8.9' }
      - run: gradle :openmekit:testDebugUnitTest

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '17', distribution: temurin }
      - uses: gradle/actions/setup-gradle@v5
        with: { gradle-version: '8.9' }
      - name: Get version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#app-android-v}" >> "$GITHUB_OUTPUT"

      # ── Debug APK (always) ────────────────────────────────────────────────────────
      - run: gradle :app:assembleDebug
      - name: Rename debug APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
            "app/build/outputs/apk/debug/openme-${{ steps.ver.outputs.VERSION }}-debug.apk"
      - uses: actions/upload-artifact@v7
        with:
          name: apk-debug
          path: android/app/build/outputs/apk/debug/openme-*.apk

      # ── Release APK (signed, when secrets are present) ──────────────────────
      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
      - name: Build release APK
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          gradle :app:assembleRelease \
            -Pandroid.injected.signing.store.file="$PWD/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
      - name: Rename release APK
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
            "app/build/outputs/apk/release/openme-${{ steps.ver.outputs.VERSION }}.apk"
      - uses: actions/upload-artifact@v7
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        with:
          name: apk-release
          path: android/app/build/outputs/apk/release/openme-*.apk

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#app-android-v}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v7
        with:
          pattern: apk-*
          merge-multiple: true
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "OpenMe Android App v${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: dist/*
