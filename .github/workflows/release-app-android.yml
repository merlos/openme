# =============================================================================
# release-app-android.yml
#
# Builds, optionally signs, and publishes the openme Android app.
#
# TRIGGER
#   Push a tag matching  app-android-v*  (e.g. app-android-v0.1.0).
#   The version number is derived by stripping the "app-android-v" prefix.
#
# JOBS
#   test    → Runs openmekit JVM unit tests with Gradle on ubuntu-latest.
#
#   build   → Decodes the keystore secret (when present) to a temp file and
#             runs android/scripts/release-android.sh which:
#               1. Builds a debug APK  (openme-<version>-debug.apk)
#               2. Builds a signed release APK  (openme-<version>.apk)
#                  when ANDROID_KEYSTORE_BASE64 is set.
#             Both APKs are uploaded as separate artifacts.
#
#   release → Downloads all APK artifacts and creates a GitHub Release named
#             "OpenMe Android App v<VERSION>" with auto-generated release notes.
#
# LOCAL EQUIVALENT
#   ./android/scripts/release-android.sh <version>
#   (Reads ANDROID_KEYSTORE_FILE, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS,
#    ANDROID_KEY_PASSWORD from environment or android/scripts/.env)
#
# REQUIRED SECRETS (only needed for signed release APK)
#   ANDROID_KEYSTORE_BASE64
#     Your Android signing keystore (.jks or .keystore) base64-encoded:
#       base64 -i release.keystore | pbcopy   # macOS
#       base64 release.keystore               # Linux
#     If this secret is absent the workflow still runs but only produces
#     a debug APK.
#
#   ANDROID_KEYSTORE_PASSWORD
#     The password for the keystore file.
#
#   ANDROID_KEY_ALIAS
#     The alias of the signing key inside the keystore.
#
#   ANDROID_KEY_PASSWORD
#     The password for the key identified by ANDROID_KEY_ALIAS
#     (may be the same as ANDROID_KEYSTORE_PASSWORD).
#
# CREATING A KEYSTORE (first time)
#  /Applications/Android\ Studio.app/Contents/jbr/Contents/Home/bin 
#   keytool -genkeypair -v \
#     -keystore release.keystore \
#     -alias openme \
#     -keyalg RSA -keysize 4096 \
#     -validity 10000
#   # Then base64-encode and save as ANDROID_KEYSTORE_BASE64.
# =============================================================================
name: Release — Android App

on:
  push:
    tags: ['app-android-v*']

permissions:
  contents: write

jobs:
  test:
    name: openmekit JVM unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '17', distribution: temurin }
      - uses: gradle/actions/setup-gradle@v5
        with: { gradle-version: '8.9' }
      - run: gradle :openmekit:testDebugUnitTest

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '17', distribution: temurin }
      - uses: gradle/actions/setup-gradle@v5
        with: { gradle-version: '8.9' }

      - name: Get version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#app-android-v}" >> "$GITHUB_OUTPUT"

      # ── CI-only: decode keystore to a temp file ──────────────────────────────
      # Locally ANDROID_KEYSTORE_FILE points directly to the file on disk.
      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      # ── Run release script ───────────────────────────────────────────────────
      - name: Build APKs
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/scripts/release-android.sh
          ./android/scripts/release-android.sh "${{ steps.ver.outputs.VERSION }}" \
            --skip-tests \
            --output-dir "$RUNNER_TEMP/dist"

      # ── Clean up keystore ────────────────────────────────────────────────────
      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.keystore"

      - uses: actions/upload-artifact@v7
        with:
          name: apk-debug
          path: ${{ runner.temp }}/dist/openme-*-debug.apk

      - uses: actions/upload-artifact@v7
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        with:
          name: apk-release
          path: ${{ runner.temp }}/dist/openme-*[0-9].apk

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#app-android-v}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v7
        with:
          pattern: apk-*
          merge-multiple: true
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "OpenMe Android App v${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: dist/*
