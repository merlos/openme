name: Release — Android App

on:
  push:
    tags: ['app/android/v*']

permissions:
  contents: write

jobs:
  test:
    name: openmekit JVM unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '17', distribution: temurin }
      - uses: gradle/actions/setup-gradle@v5
        with: { gradle-version: '8.9' }
      - run: gradle :openmekit:testDebugUnitTest

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '17', distribution: temurin }
      - uses: gradle/actions/setup-gradle@v5
        with: { gradle-version: '8.9' }
      - name: Get version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_OUTPUT"

      # ── Debug APK (always) ────────────────────────────────────────────────────────
      - run: gradle :app:assembleDebug
      - name: Rename debug APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
            "app/build/outputs/apk/debug/openme-${{ steps.ver.outputs.VERSION }}-debug.apk"
      - uses: actions/upload-artifact@v7
        with:
          name: apk-debug
          path: android/app/build/outputs/apk/debug/openme-*.apk

      # ── Release APK (signed, when secrets are present) ──────────────────────
      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
      - name: Build release APK
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          gradle :app:assembleRelease \
            -Pandroid.injected.signing.store.file="$PWD/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"
      - name: Rename release APK
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
            "app/build/outputs/apk/release/openme-${{ steps.ver.outputs.VERSION }}.apk"
      - uses: actions/upload-artifact@v7
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        with:
          name: apk-release
          path: android/app/build/outputs/apk/release/openme-*.apk

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: apk-*
          merge-multiple: true
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "Android App ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*
