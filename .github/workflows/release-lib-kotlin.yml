name: Release — Kotlin OpenMeKit

on:
  push:
    tags: ['lib/kotlin/v*']

permissions:
  contents: write

jobs:
  test:
    name: openmekit JVM unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: temurin }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.9' }
      - run: gradle :openmekit:testDebugUnitTest

  build:
    name: Build release AAR
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: temurin }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.9' }
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_OUTPUT"
      - run: gradle :openmekit:assembleRelease
      - name: Rename AAR
        run: |
          mv openmekit/build/outputs/aar/openmekit-release.aar \
            "openmekit-${{ steps.ver.outputs.VERSION }}.aar"
      - uses: actions/upload-artifact@v4
        with:
          name: kotlin-aar
          path: android/openmekit-*.aar

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kotlin-aar
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "OpenMeKit (Kotlin/Android) ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*
