name: Release — C# OpenMeKit

on:
  push:
    tags: ['lib/csharp/v*']

permissions:
  contents: write

jobs:
  test:
    name: xUnit tests / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '8.x' }
      - run: dotnet restore OpenMeKit.Tests/OpenMeKit.Tests.csproj
      - run: dotnet test OpenMeKit.Tests/OpenMeKit.Tests.csproj -c Release

  build:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '8.x' }
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_OUTPUT"
      - name: Pack
        run: |
          dotnet pack OpenMeKit/OpenMeKit.csproj \
            -c Release \
            -p:Version=${{ steps.ver.outputs.VERSION }} \
            -o nupkg
      - uses: actions/upload-artifact@v7
        with:
          name: csharp-nupkg
          path: windows/nupkg/*.nupkg

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: csharp-nupkg
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "OpenMeKit (C#/.NET) ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*
