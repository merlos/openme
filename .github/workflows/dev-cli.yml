name: dev - cli

on:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
      - '.github/workflows/dev-cli.yml'
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/dev-cli.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: cli

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: cli/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test -race -coverprofile=coverage.out ./...
        shell: bash

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: cli/coverage.out

  build:
    name: Cross-compile
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: cli/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          # Derive CLI version from the most-recent cli/v* tag, fallback to 0.0.0-dev
          VERSION=$(git describe --tags --abbrev=0 --match 'cli/v*' 2>/dev/null | sed 's/^cli\/v//' || echo "0.0.0-dev")
          GO_LDFLAGS="-s -w -X github.com/merlos/openme/cli/pkg/version.Version=${VERSION}"
          go build -ldflags="$GO_LDFLAGS" -o openme-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/openme

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: openme-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/openme-${{ matrix.goos }}-${{ matrix.goarch }}*

  docs:
    name: Build Quarto docs
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render docs
        run: quarto render
        working-directory: docs

      - name: Upload docs site
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: docs/_site/
