name: Release — C openmelib

on:
  push:
    tags: ['lib/c/v*']

permissions:
  contents: write

jobs:
  test:
    name: CMake build & test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure & build
        run: |
          cmake -S c/openmelib -B c/openmelib/_build \
            -DOPENME_FETCH_MONOCYPHER=ON \
            -DCMAKE_BUILD_TYPE=Release -Wno-dev
          cmake --build c/openmelib/_build
      - name: Run tests
        run: ctest --test-dir c/openmelib/_build --output-on-failure

  build:
    name: Package static lib / ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - arch: x86_64
            extra_cmake: ''
          - arch: aarch64
            extra_cmake: '-DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc'
    steps:
      - uses: actions/checkout@v4
      - name: Install aarch64 toolchain
        if: matrix.arch == 'aarch64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_OUTPUT"
      - name: Configure & build
        run: |
          cmake -S c/openmelib -B _build \
            -DOPENME_FETCH_MONOCYPHER=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -Wno-dev \
            ${{ matrix.extra_cmake }}
          cmake --build _build
      - name: Package
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          ARCH="${{ matrix.arch }}"
          PKG="openmelib-${VERSION}-linux-${ARCH}"
          mkdir -p "${PKG}/lib" "${PKG}/include"
          cp _build/libopenmelib.a "${PKG}/lib/"
          cp c/openmelib/include/openmelib.h "${PKG}/include/"
          tar -czf "${PKG}.tar.gz" "${PKG}"
      - uses: actions/upload-artifact@v4
        with:
          name: c-lib-${{ matrix.arch }}
          path: openmelib-*.tar.gz

  source:
    name: Source tarball
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_OUTPUT"
      - name: Create source tarball
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          tar -czf "openmelib-${VERSION}-src.tar.gz" \
            --transform "s|^c/openmelib|openmelib-${VERSION}|" \
            c/openmelib
      - uses: actions/upload-artifact@v4
        with:
          name: c-src
          path: openmelib-*-src.tar.gz

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, source]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: c-*
          merge-multiple: true
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "openmelib (C) ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*
