name: Release — C openmelib

on:
  push:
    tags: ['lib/c/v*']

permissions:
  contents: write

jobs:
  test:
    name: CMake build & test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure & build
        run: |
          cmake -S c/openmelib -B c/openmelib/_build \
            -DOPENME_FETCH_MONOCYPHER=ON \
            -DCMAKE_BUILD_TYPE=Release -Wno-dev
          cmake --build c/openmelib/_build
      - name: Run tests
        run: ctest --test-dir c/openmelib/_build --output-on-failure

  build:
    name: Package static lib / ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - arch: x86_64
            extra_cmake: ''
          - arch: aarch64
            extra_cmake: '-DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc'
    steps:
      - uses: actions/checkout@v4
      - name: Install aarch64 toolchain
        if: matrix.arch == 'aarch64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_OUTPUT"
      - name: Configure & build
        run: |
          cmake -S c/openmelib -B _build \
            -DOPENME_FETCH_MONOCYPHER=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -Wno-dev \
            ${{ matrix.extra_cmake }}
          cmake --build _build
      - name: Package
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          ARCH="${{ matrix.arch }}"
          PKG="openmelib-${VERSION}-linux-${ARCH}"
          mkdir -p "${PKG}/lib" "${PKG}/include"
          cp _build/libopenmelib.a "${PKG}/lib/"
          cp c/openmelib/include/openmelib.h "${PKG}/include/"
          tar -czf "${PKG}.tar.gz" "${PKG}"
      - uses: actions/upload-artifact@v4
        with:
          name: c-lib-${{ matrix.arch }}
          path: openmelib-*.tar.gz

  source:
    name: Source tarball
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_OUTPUT"
      - name: Stamp version into source files
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # openmelib.h — version macros
          sed -i \
            -e "s/^#define OPENMELIB_VERSION_MAJOR .*/#define OPENMELIB_VERSION_MAJOR ${MAJOR}/" \
            -e "s/^#define OPENMELIB_VERSION_MINOR .*/#define OPENMELIB_VERSION_MINOR ${MINOR}/" \
            -e "s/^#define OPENMELIB_VERSION_PATCH .*/#define OPENMELIB_VERSION_PATCH ${PATCH}/" \
            -e "s/^#define OPENMELIB_VERSION_STRING .*/#define OPENMELIB_VERSION_STRING \"${VERSION}\"/" \
            c/openmelib/include/openmelib.h

          # CMakeLists.txt — project(openmelib VERSION ...)
          sed -i "s/^project(openmelib VERSION [^ ]*/project(openmelib VERSION ${VERSION}/" \
            c/openmelib/CMakeLists.txt

          # library.properties — Arduino Library Manager
          sed -i "s/^version=.*/version=${VERSION}/" \
            c/openmelib/library.properties

          # idf_component.yml — ESP-IDF Component Manager
          sed -i "s/^version: .*/version: \"${VERSION}\"/" \
            c/openmelib/idf_component.yml
      - name: Create source tarball
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          tar -czf "openmelib-${VERSION}-src.tar.gz" \
            --transform "s|^c/openmelib|openmelib-${VERSION}|" \
            c/openmelib
      - uses: actions/upload-artifact@v4
        with:
          name: c-src
          path: openmelib-*-src.tar.gz

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, source]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: c-*
          merge-multiple: true
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "openmelib (C) ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*

  # Deploy the c/openmelib/ subtree to the standalone merlos/openmelib repo so
  # that the Arduino Library Manager and ESP-IDF Component Manager can find
  # library.properties / idf_component.yml at the repository root.
  #
  # Required secret: OPENMELIB_DEPLOY_PAT
  #   A GitHub Personal Access Token (classic or fine-grained) with
  #   "Contents: Read & Write" permission on the merlos/openmelib repo.
  #   Add it at: Settings → Secrets and variables → Actions → New secret
  deploy-mirror:
    name: Mirror to merlos/openmelib
    runs-on: ubuntu-latest
    needs: test   # run as soon as tests pass; no need to wait for binary builds
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into source files
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          sed -i \
            -e "s/^#define OPENMELIB_VERSION_MAJOR .*/#define OPENMELIB_VERSION_MAJOR ${MAJOR}/" \
            -e "s/^#define OPENMELIB_VERSION_MINOR .*/#define OPENMELIB_VERSION_MINOR ${MINOR}/" \
            -e "s/^#define OPENMELIB_VERSION_PATCH .*/#define OPENMELIB_VERSION_PATCH ${PATCH}/" \
            -e "s/^#define OPENMELIB_VERSION_STRING .*/#define OPENMELIB_VERSION_STRING \"${VERSION}\"/" \
            c/openmelib/include/openmelib.h
          sed -i "s/^project(openmelib VERSION [^ ]*/project(openmelib VERSION ${VERSION}/" \
            c/openmelib/CMakeLists.txt
          sed -i "s/^version=.*/version=${VERSION}/" \
            c/openmelib/library.properties
          sed -i "s/^version: .*/version: \"${VERSION}\"/" \
            c/openmelib/idf_component.yml

      - name: Clone mirror repo
        env:
          PAT: ${{ secrets.OPENMELIB_DEPLOY_PAT }}
        run: |
          git clone "https://x-access-token:${PAT}@github.com/merlos/openmelib.git" _mirror

      - name: Sync files
        run: |
          # Wipe everything except .git, then copy c/openmelib/ contents to root
          find _mirror -mindepth 1 -maxdepth 1 -not -name '.git' -exec rm -rf {} +
          cp -r c/openmelib/. _mirror/

      - name: Commit and tag
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          cd _mirror
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release ${VERSION}" || echo "Nothing to commit"
          # Plain vX.Y.Z tag — required by Arduino Library Manager
          git tag "v${VERSION}"

      - name: Push mirror
        env:
          PAT: ${{ secrets.OPENMELIB_DEPLOY_PAT }}
        run: |
          cd _mirror
          git remote set-url origin "https://x-access-token:${PAT}@github.com/merlos/openmelib.git"
          git push origin HEAD --follow-tags
