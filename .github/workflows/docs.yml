name: dev - docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'website/**'
      - 'apple/OpenMeKit/**'
      - 'android/openmekit/**'
      - 'c/openmelib/include/**'
      - 'c/openmelib/src/**'
      - 'c/openmelib/Doxyfile'
      - 'windows/OpenMeKit/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Swift / DocC (macOS required for swift-docc-plugin) ────────────────────
  docs-swift:
    name: Generate DocC reference (Swift)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Generate DocC (OpenMeKit)
        working-directory: apple/OpenMeKit
        run: |
          swift package --allow-writing-to-directory swift-docs \
            generate-documentation \
            --target OpenMeKit \
            --output-path swift-docs \
            --transform-for-static-hosting \
            --hosting-base-path /docs/api/swift

      # Tar the output so colons in DocC filenames (e.g. parse(yaml:).json)
      # make it cross platform safe -  don't trip the NTFS-safe check in actions/upload-artifact.

      - name: Archive DocC output
        run: tar -czf swift-docc.tar.gz -C apple/OpenMeKit swift-docs

      - uses: actions/upload-artifact@v7
        with:
          name: swift-docc
          path: swift-docc.tar.gz

  # ── Quarto site + Doxygen / Dokka / DocFX (ubuntu) ─────────────────────────
  build:
    name: Build Quarto docs + API references
    runs-on: ubuntu-latest
    needs: docs-swift

    steps:
      - uses: actions/checkout@v6

      # ── C library: Doxygen ─────────────────────────────────────────────────
      - name: Install Doxygen
        run: sudo apt-get install -y --no-install-recommends doxygen

      - name: Generate Doxygen reference (openmelib — C)
        run: |
          cd c/openmelib
          doxygen Doxyfile
          mkdir -p ../../docs/api/c
          cp -r html/. ../../docs/api/c/

      # ── Android: Dokka ─────────────────────────────────────────────────────
      - name: Set up JDK 17 (Dokka)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate KDoc reference (Android — OpenMeKit)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew openmekit:dokkaHtml
        # Output path is configured in openmekit/build.gradle.kts:
        # rootProject.file("../docs/android-sdk/openmekit")

      # ── C# / .NET: DocFX ───────────────────────────────────────────────────
      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Generate API reference (C# — OpenMeKit .NET)
        run: docfx windows/OpenMeKit/docfx.json
        # Output path is configured in docfx.json → docs/api/csharp/

      # ── Swift: download DocC artifact produced by docs-swift job ───────────
      - name: Download DocC reference (Swift)
        uses: actions/download-artifact@v7
        with:
          name: swift-docc
          path: /tmp/swift-docc-artifact

      - name: Extract DocC reference
        run: |
          mkdir -p docs/api/swift
          tar -xzf /tmp/swift-docc-artifact/swift-docc.tar.gz \
            -C docs/api/swift --strip-components=1

      # ── Quarto render ──────────────────────────────────────────────────────
      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Render docs
        run: quarto render
        working-directory: docs

      # ── Assemble final site ────────────────────────────────────────────────
      - name: Assemble site (website at root, docs at /docs/)
        run: |
          mkdir -p _site/docs
          cp -r website/. _site/
          cp -r docs/_site/. _site/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site/

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
