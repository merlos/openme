# =============================================================================
# release-macos-app.yml
#
# Builds, signs, notarizes and publishes the openme macOS menu-bar app.
#
# TRIGGER
#   Push a tag matching  macos-app-v*  (e.g. macos-app-v0.1.0).
#   The version number is derived by stripping the "macos-app-v" prefix.
#
# JOBS
#   test    → Runs the Xcode test suite (openme-macos scheme, macOS destination)
#             without code-signing so it can run on a clean CI runner.
#
#   build   → Imports the Developer ID certificate and App Store Connect API
#             key from secrets, runs apple/scripts/release-macos.sh which:
#               1. Compiles & archives the app with xcodebuild
#               2. Code-signs with the Developer ID Application certificate
#               3. Creates a DMG with create-dmg
#               4. Submits to Apple notarization and staples the ticket
#             The signed, notarized DMG is uploaded as the artifact "macos-dmg".
#
#   release → Downloads the artifact and creates a GitHub Release named
#             "OpenMe macOS App v<VERSION>" with auto-generated release notes.
#
# REQUIRED SECRETS
#   APPLE_CERTIFICATE_BASE64
#     Export your "Developer ID Application" certificate from Keychain Access
#     as a .p12 file (include the private key), then base64-encode it:
#       base64 -i DeveloperIDApplication.p12 | pbcopy
#     Set the result as this secret.
#
#   APPLE_CERTIFICATE_PASSWORD
#     The passphrase you set when exporting the .p12 file.
#
#   APPLE_TEAM_ID
#     Your 10-character Apple Developer Team ID (e.g. "AB12CD34EF").
#     Find it at https://developer.apple.com/account → Membership.
#
#   APPLE_API_KEY_ID
#     The Key ID of an App Store Connect API key with Developer role.
#     Create one at https://appstoreconnect.apple.com/access/api.
#     Looks like "ABCD123456".
#
#   APPLE_API_KEY_ISSUER_ID
#     The Issuer ID shown on the same App Store Connect API keys page.
#     Looks like a UUID: "12345678-1234-1234-1234-123456789abc".
#
#   APPLE_API_KEY_BASE64
#     The .p8 private key file downloaded when creating the API key,
#     base64-encoded:
#       base64 -i AuthKey_ABCD123456.p8 | pbcopy
#
# LOCAL EQUIVALENT
#   ./apple/scripts/release-macos.sh <version>
#   (Reads APPLE_TEAM_ID, APPLE_API_KEY_ID, APPLE_API_KEY_ISSUER_ID,
#    APPLE_API_KEY_PATH from environment or an .env file.)
# =============================================================================
name: Release — macOS App

on:
  push:
    tags: ['macos-app-v*']

permissions:
  contents: write

jobs:
  test:
    name: Test macOS app
    runs-on: macos-26
    defaults:
      run:
        working-directory: apple
    steps:
      - uses: actions/checkout@v6
      - name: Resolve packages
        run: xcodebuild -workspace openme.xcworkspace -scheme openme-macos -resolvePackageDependencies
      - name: Run tests
        run: |
          xcodebuild test \
            -workspace openme.xcworkspace \
            -scheme openme-macos \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

  build:
    name: Build, sign & notarize DMG
    runs-on: macos-26
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#macos-app-v}" >> "$GITHUB_OUTPUT"

      # ── CI-only: import Developer ID cert into a short-lived keychain ────────
      # Locally the cert lives in the login keychain; on CI it comes from a secret.
      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          rm "$RUNNER_TEMP/certificate.p12"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # ── CI-only: decode App Store Connect API key to a file ──────────────────
      # Locally APPLE_API_KEY_PATH points to the .p8 file on disk.
      - name: Decode App Store Connect API key
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install create-dmg
        run: brew install create-dmg

      # ── Run release script ───────────────────────────────────────────────────
      - name: Build, sign & notarize
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          # APPLE_API_KEY_PATH is set by the decode step above via GITHUB_ENV
        run: |
          ./apple/scripts/release-macos.sh "${{ steps.ver.outputs.VERSION }}" \
            --skip-tests \
            --output-dir "$RUNNER_TEMP/dist"

      # ── Cleanup & upload ─────────────────────────────────────────────────────
      - name: Clean up secrets
        if: always()
        run: |
          rm -f "$APPLE_API_KEY_PATH"
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: ${{ runner.temp }}/dist/openme-macos-*.dmg

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#macos-app-v}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v7
        with:
          name: macos-dmg
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "OpenMe macOS App v${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: dist/*
