name: Release — Windows App

on:
  push:
    tags: ['app/windows/v*']

permissions:
  contents: write

jobs:
  test:
    name: Test OpenMeKit (.NET)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.x' }
      - run: dotnet restore OpenMeKit.Tests/OpenMeKit.Tests.csproj
      - run: dotnet test OpenMeKit.Tests/OpenMeKit.Tests.csproj -c Release

  build:
    name: Build / ${{ matrix.rid }}
    runs-on: windows-latest
    needs: test
    strategy:
      matrix:
        rid: [win-x64, win-arm64]
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.x' }
      - name: Get version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_OUTPUT"
      - name: Publish
        shell: pwsh
        run: |
          dotnet publish openme-windows/openme-windows.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -o publish/${{ matrix.rid }}
      - name: Zip
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.VERSION }}"
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" `
            -DestinationPath "openme-windows-${version}-${{ matrix.rid }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.rid }}
          path: windows/openme-windows-*.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: windows-*
          merge-multiple: true
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "Windows App ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*
