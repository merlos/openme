# =============================================================================
# release-cli.yml
#
# Tests, cross-compiles, packages as .deb, and publishes the openme CLI.
#
# TRIGGER
#   Push a tag matching  cli-v*  (e.g. cli-v0.1.0).
#   The version number is derived by stripping the "cli-v" prefix.
#
# JOBS
#   test    → Matrix job over [ubuntu-latest, macos-latest, windows-latest].
#             Runs go vet and go test -race for the cli/ module.
#
#   build   → Runs `make build-all-release` in cli/ on ubuntu-latest.
#             Produces cross-compiled binaries for all target platforms and
#             uploads them as the artifact "cli-binaries":
#               openme-linux-amd64
#               openme-linux-arm64
#               openme-linux-arm      (armv7 / Raspberry Pi)
#               openme-linux-386
#               openme-linux-riscv64
#               openme-darwin-arm64   (macOS Apple Silicon)
#               openme-windows-amd64.exe
#
#   deb     → Matrix job over [amd64, arm64, armhf, i386, riscv64].
#             Each job downloads the cli-binaries artifact, constructs a
#             Debian package directory from cli/packaging/debian/, installs
#             the binary + man page + systemd unit, and runs dpkg-deb.
#             Produces:
#               openme_<version>_<arch>.deb
#
#   release → Downloads all cli-* artifacts and creates a GitHub Release
#             named "OpenMe CLI v<VERSION>" with auto-generated release notes.
#
# REQUIRED SECRETS
#   None — Go cross-compilation and dpkg-deb packaging require no credentials.
#
# LOCAL BUILD
#   cd cli
#   make build-all-release   # produces dist/openme-*
#
# TAGGING CONVENTION
#   git tag cli-v0.1.0
#   git push origin cli-v0.1.0
# =============================================================================
name: Release — CLI

on:
  push:
    tags: ['cli-v*']

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: cli/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go test -race ./...
        shell: bash

  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: cli/go.sum
      - name: Build all release binaries
        run: make build-all-release
      - uses: actions/upload-artifact@v7
        with:
          name: cli-binaries
          path: cli/dist/openme-*

  deb:
    name: Debian package / ${{ matrix.dpkg_arch }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - { goarch: amd64,   dpkg_arch: amd64   }
          - { goarch: arm64,   dpkg_arch: arm64   }
          - { goarch: arm,     dpkg_arch: armhf   }  # armv7 / Raspberry Pi
          - { goarch: '386',   dpkg_arch: i386    }
          - { goarch: riscv64, dpkg_arch: riscv64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: cli-binaries
          path: dist/
      - name: Build .deb
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#cli-v}"
          ARCH="${{ matrix.dpkg_arch }}"
          PKGDIR="openme_${VERSION}_${ARCH}"

          mkdir -p "${PKGDIR}/DEBIAN"
          mkdir -p "${PKGDIR}/usr/bin"
          mkdir -p "${PKGDIR}/usr/share/man/man1"
          mkdir -p "${PKGDIR}/lib/systemd/system"

          install -m 755 "dist/openme-linux-${{ matrix.goarch }}" \
                         "${PKGDIR}/usr/bin/openme"
          gzip -9 -c cli/packaging/openme.1 \
                   > "${PKGDIR}/usr/share/man/man1/openme.1.gz"
          cp cli/packaging/systemd/openme.service \
             "${PKGDIR}/lib/systemd/system/"

          sed "s/{{VERSION}}/${VERSION}/g; s/{{ARCH}}/${ARCH}/g" \
              cli/packaging/debian/control > "${PKGDIR}/DEBIAN/control"
          install -m 755 cli/packaging/debian/postinst \
                         cli/packaging/debian/prerm \
                         "${PKGDIR}/DEBIAN/"

          dpkg-deb --root-owner-group --build "${PKGDIR}"
      - uses: actions/upload-artifact@v7
        with:
          name: cli-deb-${{ matrix.dpkg_arch }}
          path: openme_*_${{ matrix.dpkg_arch }}.deb

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, deb]
    steps:
      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#cli-v}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v7
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "OpenMe CLI v${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: dist/*
