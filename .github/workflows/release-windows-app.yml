# =============================================================================
# release-windows-app.yml
#
# Builds and publishes the openme Windows WPF system-tray application.
#
# TRIGGER
#   Push a tag matching  windows-app-v*  (e.g. windows-app-v0.1.0).
#   The version number is derived by stripping the "windows-app-v" prefix.
#
# JOBS
#   test    → Runs the OpenMeKit.Tests xUnit suite with dotnet test on
#             windows-latest.
#
#   build   → Matrix job over [win-x64, win-arm64].
#             Each job runs `dotnet publish` with --self-contained true for
#             the given RID, zips the output directory, and uploads the zip
#             as an artifact (windows-win-x64 / windows-win-arm64).
#
#   release → Downloads both artifacts and creates a GitHub Release named
#             "OpenMe Windows App v<VERSION>" with auto-generated release notes.
#             Produces:
#               openme-windows-<version>-win-x64.zip
#               openme-windows-<version>-win-arm64.zip
#
# REQUIRED SECRETS
#   None — the Windows build is unsigned. No secrets are needed to run
#   this workflow.
#
#   Optional: to code-sign the .exe with a Windows Authenticode certificate,
#   add a signtool step in the build job and provide:
#     WINDOWS_CERTIFICATE_BASE64  — base64-encoded .pfx file:
#       base64 -i certificate.pfx | pbcopy
#     WINDOWS_CERTIFICATE_PASSWORD — passphrase for the .pfx
# =============================================================================
name: Release — Windows App

on:
  push:
    tags: ['windows-app-v*']

permissions:
  contents: write

jobs:
  test:
    name: Test OpenMeKit (.NET)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '8.x' }
      - run: dotnet restore OpenMeKit.Tests/OpenMeKit.Tests.csproj
      - run: dotnet test OpenMeKit.Tests/OpenMeKit.Tests.csproj -c Release

  build:
    name: Build / ${{ matrix.rid }}
    runs-on: windows-latest
    needs: test
    strategy:
      matrix:
        rid: [win-x64, win-arm64]
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '8.x' }
      - name: Get version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#windows-app-v}" >> "$GITHUB_OUTPUT"
      - name: Publish
        shell: pwsh
        run: |
          dotnet publish openme-windows/openme-windows.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -o publish/${{ matrix.rid }}
      - name: Zip
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.VERSION }}"
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" `
            -DestinationPath "openme-windows-${version}-${{ matrix.rid }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.rid }}
          path: windows/openme-windows-*.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: windows-*
          merge-multiple: true
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          name: "Windows App ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*
